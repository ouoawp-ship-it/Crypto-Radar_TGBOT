name: Tests

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile Python sources
        run: python -m compileall -q paopao_radar tests scripts

      - name: Run test suite
        run: python -m unittest discover -s tests -p "test_*.py"

  frontend-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Type-check frontend
        run: npm run typecheck

      - name: Build production frontend
        run: npm run build

      - name: Install Chromium for browser checks
        run: npx playwright install --with-deps chromium

      - name: Run browser workflow checks
        run: npm run e2e:functional

  frontend-visual-checks:
    runs-on: windows-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-visual.txt

      - name: Install frontend dependencies
        run: npm ci

      - name: Install visual comparison dependencies
        run: python -m pip install -r ../requirements-visual.txt

      - name: Install Chromium for visual checks
        run: npx playwright install chromium

      - name: Run Windows visual regression checks
        env:
          MERCU_CAPTURE_DSF: "1.25"
          MERCU_ACTUAL_DIR: e2e/mercu-current-ci
        run: npm run e2e:visual

      - name: Compare live render with Mercu login-state targets
        run: npm run visual:mercu:acceptance -- --actual-dir e2e/mercu-current-ci --output-dir e2e/mercu-diffs-ci

      - name: Upload Mercu visual evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mercu-visual-evidence-windows
          path: |
            frontend/e2e/mercu-current-ci
            frontend/e2e/mercu-diffs-ci
          if-no-files-found: warn
