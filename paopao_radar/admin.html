<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>泡泡雷达控制台</title>
  <style>
    :root{--bg:#f5f7fa;--panel:#fff;--line:#e2e7ee;--text:#15202f;--muted:#697586;--brand:#2563eb;--good:#14804a;--warn:#b7791f;--bad:#c53030;--radius:12px}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,"Noto Sans SC","Microsoft YaHei",system-ui,sans-serif;font-size:14px}button,input,select,textarea{font:inherit}button{cursor:pointer}.hidden{display:none!important}
    .login{min-height:100vh;display:grid;place-items:center;padding:24px}.login-card{width:min(420px,100%);padding:30px;background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:0 18px 50px #1e293b12}.login-card h1{margin:0 0 8px;font-size:24px}.muted{color:var(--muted)}
    .field{display:grid;gap:7px;margin-top:16px}.input{width:100%;min-height:42px;border:1px solid var(--line);border-radius:9px;padding:9px 11px;background:#fff;color:var(--text)}textarea.input{min-height:160px;resize:vertical}.btn{min-height:38px;border:1px solid var(--line);border-radius:9px;padding:8px 13px;background:#fff;color:var(--text);font-weight:650}.btn:hover{border-color:#b7c2d0}.btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}.btn.danger{color:var(--bad)}.row{display:flex;align-items:center;gap:9px;flex-wrap:wrap}.stack{display:grid;gap:14px}
    .shell{min-height:100vh}.topbar{position:sticky;top:0;z-index:10;height:62px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;background:#fff;border-bottom:1px solid var(--line)}.brand{font-weight:750}.brand small{display:block;margin-top:2px;color:var(--muted);font-weight:500}.layout{display:grid;grid-template-columns:220px minmax(0,1fr);min-height:calc(100vh - 62px)}
    .nav{padding:18px 12px;background:#fff;border-right:1px solid var(--line)}.nav button{display:flex;width:100%;margin-bottom:4px;border:0;border-radius:8px;padding:10px 12px;background:transparent;color:#526071;text-align:left}.nav button:hover,.nav button.active{background:#eef4ff;color:#1d4ed8}.content{min-width:0;padding:24px}.page-head{display:flex;justify-content:space-between;align-items:end;gap:16px;margin-bottom:18px}.page-head h1{margin:0;font-size:23px}.page-head p{margin:5px 0 0;color:var(--muted)}
    .grid{display:grid;grid-template-columns:repeat(12,minmax(0,1fr));gap:14px}.span-12{grid-column:span 12}.span-8{grid-column:span 8}.span-6{grid-column:span 6}.span-4{grid-column:span 4}.span-3{grid-column:span 3}.panel{min-width:0;background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:17px}.panel h2,.panel h3{margin:0 0 12px}.metric{font-size:25px;font-weight:730}.label{font-size:12px;color:var(--muted);margin-bottom:8px}.pill{display:inline-flex;border:1px solid var(--line);border-radius:999px;padding:3px 8px;font-size:12px}.pill.good{color:var(--good);background:#ecfdf3}.pill.bad{color:var(--bad);background:#fff5f5}.pill.warn{color:var(--warn);background:#fffaf0}
    .table-wrap{overflow:auto}table{width:100%;border-collapse:collapse}th,td{padding:10px 9px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top;white-space:nowrap}th{font-size:12px;color:var(--muted);font-weight:650}td.wrap{white-space:normal;min-width:250px}.empty{padding:28px;text-align:center;color:var(--muted)}pre{margin:0;padding:14px;overflow:auto;border-radius:9px;background:#101827;color:#d7e0ed;white-space:pre-wrap;word-break:break-word;max-height:560px}
    .config-section{margin-bottom:14px}.config-section summary{cursor:pointer;padding:12px 0;font-weight:700}.config-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.help{font-size:12px;line-height:1.55;color:var(--muted)}.notice{padding:11px 13px;border-radius:9px;background:#eef4ff;color:#1e4fa3}.error{padding:11px 13px;border-radius:9px;background:#fff1f1;color:var(--bad)}
    #toast{position:fixed;right:20px;bottom:20px;z-index:30;max-width:420px;padding:12px 15px;border-radius:10px;background:#172033;color:#fff;box-shadow:0 14px 35px #0003}
    @media(max-width:900px){.layout{display:block}.nav{position:sticky;top:62px;z-index:9;display:flex;overflow:auto;border-right:0;border-bottom:1px solid var(--line);padding:8px}.nav button{width:auto;white-space:nowrap;margin:0 4px}.content{padding:16px}.span-8,.span-6,.span-4,.span-3{grid-column:span 12}.config-grid{grid-template-columns:1fr}.topbar{padding:0 14px}}
  </style>
</head>
<body>
  <section id="login" class="login">
    <form id="loginForm" class="login-card">
      <h1>泡泡雷达控制台</h1><div class="muted">登录后管理服务、配置、信号与后台任务。</div>
      <label class="field"><span>用户名</span><input id="username" class="input" autocomplete="username" value="admin"></label>
      <label class="field"><span>密码</span><input id="password" class="input" type="password" autocomplete="current-password"></label>
      <div id="loginError" class="error hidden" style="margin-top:14px"></div>
      <button class="btn primary" style="width:100%;margin-top:18px" type="submit">登录</button>
    </form>
  </section>
  <section id="app" class="shell hidden">
    <header class="topbar"><div class="brand">泡泡雷达 <small>运行与推送控制台</small></div><div class="row"><a class="btn" href="/">公开前台</a><button id="logout" class="btn">退出</button></div></header>
    <div class="layout">
      <nav id="nav" class="nav">
        <button data-page="overview" class="active">运行总览</button><button data-page="signals">信号记录</button><button data-page="services">雷达服务</button><button data-page="jobs">任务中心</button><button data-page="logs">日志中心</button><button data-page="config">配置中心</button><button data-page="audit">审计记录</button><button data-page="alerts">价格提醒</button><button data-page="prompts">AI 提示词</button>
      </nav>
      <main id="content" class="content"></main>
    </div>
  </section>
  <div id="toast" class="hidden"></div>
  <script>
    const $=s=>document.querySelector(s), esc=v=>String(v??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
    let csrf="", currentPage="overview";
    function toast(message){const el=$("#toast");el.textContent=message;el.classList.remove("hidden");setTimeout(()=>el.classList.add("hidden"),3200)}
    async function api(path,options={}){const headers={"Content-Type":"application/json",...(options.headers||{})};if(options.method&&options.method!=="GET")headers["X-CSRF-Token"]=csrf;const res=await fetch(path,{credentials:"same-origin",...options,headers});let data={};try{data=await res.json()}catch{}if(res.status===401){showLogin();throw new Error("登录已失效")};if(!res.ok||data.ok===false)throw new Error(data.message||data.error?.message||data.error||`请求失败 ${res.status}`);return data}
    function showLogin(){ $("#login").classList.remove("hidden");$("#app").classList.add("hidden") } function showApp(){ $("#login").classList.add("hidden");$("#app").classList.remove("hidden") }
    function head(title,desc,actions=""){return `<div class="page-head"><div><h1>${esc(title)}</h1><p>${esc(desc)}</p></div><div class="row">${actions}</div></div>`}
    function pill(text,tone=""){return `<span class="pill ${tone}">${esc(text)}</span>`} function statusTone(v){v=String(v||"").toLowerCase();return ["active","running","success","sent","ok"].includes(v)?"good":["failed","inactive","error","timeout"].includes(v)?"bad":"warn"}
    function metric(label,value,hint=""){return `<div class="panel span-3"><div class="label">${esc(label)}</div><div class="metric">${esc(value??"-")}</div>${hint?`<div class="help">${esc(hint)}</div>`:""}</div>`}
    async function overview(){const [s,stats]=await Promise.all([api("/api/summary"),api("/api/signals/stats?window_sec=86400")]);const git=s.git||{},services=s.services||{},health=s.health||[];$("#content").innerHTML=head("运行总览","核心雷达、推送与 Web 服务状态",`<button class="btn" onclick="loadPage('overview')">刷新</button>`)+`<div class="grid">${metric("版本",git.version||"-")}${metric("24h 信号",stats.total||stats.count||0)}${metric("已发送",stats.sent||stats.sent_count||0)}${metric("失败",stats.failed||stats.failed_count||0)}<div class="panel span-6"><h3>服务状态</h3><div class="stack">${Object.entries(services).map(([k,v])=>`<div class="row"><b style="min-width:90px">${esc(k)}</b>${pill(v.active?"运行中":"未运行",v.active?"good":"bad")}<span class="muted">${esc(v.description||v.status||"")}</span></div>`).join("")}</div></div><div class="panel span-6"><h3>健康检查</h3><div class="stack">${health.length?health.map(x=>`<div><div class="row">${pill(x.ok?"通过":"关注",x.ok?"good":"warn")}<b>${esc(x.label||x.name||"")}</b></div><div class="help">${esc(x.detail||x.message||"")}</div></div>`).join(""):`<div class="empty">暂无健康检查数据</div>`}</div></div></div>`}
    async function signals(){const d=await api("/api/signals?limit=100");const items=d.items||[];$("#content").innerHTML=head("信号记录","查看各雷达模块写入的结构化推送记录",`<button class="btn" onclick="loadPage('signals')">刷新</button>`)+`<div class="panel table-wrap"><table><thead><tr><th>时间</th><th>币种</th><th>模块</th><th>状态</th><th>分数</th><th>摘要</th></tr></thead><tbody>${items.map(x=>`<tr><td>${esc(x.time||x.created_at||"")}</td><td><b>${esc(x.symbol||"-")}</b></td><td>${esc(x.module||"-")}</td><td>${pill(x.status||"-",statusTone(x.status))}</td><td>${esc(x.score??"-")}</td><td class="wrap">${esc(x.excerpt||x.title||"")}</td></tr>`).join("")}</tbody></table>${items.length?"":`<div class="empty">暂无信号记录</div>`}</div>`}
    async function services(){const s=await api("/api/summary"),map={main:"主雷达",web:"Web 控制台",ai:"AI 助手"};$("#content").innerHTML=head("雷达服务","启动、停止或重启核心 systemd 服务")+`<div class="grid">${Object.entries(map).map(([k,label])=>{const v=(s.services||{})[k]||{};return `<div class="panel span-6"><div class="row" style="justify-content:space-between"><div><h3>${esc(label)}</h3>${pill(v.active?"运行中":"未运行",v.active?"good":"bad")}</div><div class="row"><button class="btn" onclick="service('start-${k}')">启动</button><button class="btn" onclick="service('restart-${k}')">重启</button><button class="btn danger" onclick="service('stop-${k}')">停止</button></div></div></div>`}).join("")}</div>`}
    async function service(name){if(!confirm(`确认执行 ${name}？`))return;const r=await api("/api/service",{method:"POST",body:JSON.stringify({name})});toast(r.message||"操作已提交");setTimeout(()=>loadPage("services"),1000)}
    async function jobs(){const [list,stats]=await Promise.all([api("/api/jobs?limit=100"),api("/api/jobs/stats")]);const items=list.items||list.jobs||[];$("#content").innerHTML=head("任务中心","执行稳定性检查、诊断、清理和更新检查")+`<div class="row" style="margin-bottom:14px">${["stable-check","doctor","readiness","cleanup","update-check","api-self-test"].map(x=>`<button class="btn" onclick="createJob('${x}')">${esc(x)}</button>`).join("")}</div><div class="grid">${metric("全部",stats.total||0)}${metric("运行中",Number(stats.running||0)+Number(stats.queued||0))}${metric("成功",stats.success||0)}${metric("失败",Number(stats.failed||0)+Number(stats.timeout||0))}<div class="panel span-12 table-wrap"><table><thead><tr><th>ID</th><th>任务</th><th>状态</th><th>创建时间</th><th>耗时</th><th>错误摘要</th><th>操作</th></tr></thead><tbody>${items.map(x=>`<tr><td>${esc(x.id)}</td><td>${esc(x.job_type)}</td><td>${pill(x.status,statusTone(x.status))}</td><td>${esc(x.created_at||"")}</td><td>${esc(x.duration_ms??"-")} ms</td><td class="wrap">${esc(x.error_summary||"")}</td><td><button class="btn" onclick="jobReport(${Number(x.id)})">报告</button></td></tr>`).join("")}</tbody></table></div></div>`}
    async function createJob(job_type){const r=await api("/api/jobs",{method:"POST",body:JSON.stringify({job_type})});toast(r.message||"任务已创建");setTimeout(()=>loadPage("jobs"),700)} async function jobReport(id){const r=await api(`/api/jobs/report?id=${id}`);$("#content").innerHTML=head(`任务报告 #${id}`,"任务标准输出、错误摘要与建议动作",`<button class="btn" onclick="loadPage('jobs')">返回</button>`)+`<pre>${esc(r.report?.text||JSON.stringify(r.report,null,2))}</pre>`}
    async function logs(){const target=$("#logTarget")?.value||"main";const d=await api(`/api/logs?target=${encodeURIComponent(target)}&lines=400`);$("#content").innerHTML=head("日志中心","读取主雷达、Web 与 AI 助手日志",`<select id="logTarget" class="input" style="width:auto" onchange="logs()">${["main","web","ai"].map(x=>`<option ${x===target?"selected":""}>${x}</option>`).join("")}</select><button class="btn" onclick="logs()">刷新</button>`)+`<pre>${esc(d.logs||d.text||d.content||JSON.stringify(d,null,2))}</pre>`}
    async function config(){const d=await api("/api/config");const sections=d.sections||{};$("#content").innerHTML=head("配置中心","修改 Telegram、雷达、AI 助手与 Web 配置",`<button class="btn primary" onclick="saveConfig()">保存变更</button>`)+`<div class="notice" style="margin-bottom:14px">保存后会按影响范围自动重启对应服务。密钥留空不会覆盖现有值。</div><div class="panel">${Object.entries(sections).map(([name,items],i)=>`<details class="config-section" ${i<2?"open":""}><summary>${esc(name)} · ${items.length} 项</summary><div class="config-grid">${items.map(f=>`<label class="field"><span><b>${esc(f.label)}</b> <small class="muted">${esc(f.key)}</small></span>${f.kind==="bool"?`<select class="input cfg" data-key="${esc(f.key)}" data-original="${esc(f.display_value||"")}"><option value="">未设置</option><option value="true" ${String(f.display_value).toLowerCase()==="true"?"selected":""}>开启</option><option value="false" ${String(f.display_value).toLowerCase()==="false"?"selected":""}>关闭</option></select>`:`<input class="input cfg" data-key="${esc(f.key)}" data-original="${esc(f.secret?"":f.display_value||"")}" value="${esc(f.secret?"":f.display_value||"")}" type="${f.secret?"password":"text"}" placeholder="${f.secret?esc(f.masked||"已配置，留空不修改"):""}">`}<span class="help">${esc(f.help||f.purpose||"")}</span></label>`).join("")}</div></details>`).join("")}</div>`}
    async function saveConfig(){const updates={};document.querySelectorAll(".cfg").forEach(el=>{if(el.value!==el.dataset.original&&el.value!=="")updates[el.dataset.key]=el.value});if(!Object.keys(updates).length){toast("没有需要保存的变更");return}if(!confirm(`确认保存 ${Object.keys(updates).length} 项配置？`))return;const r=await api("/api/config",{method:"POST",body:JSON.stringify({updates,clear:[]})});toast(r.message||"配置已保存")}
    async function audit(){const d=await api("/api/audit?limit=200");const items=d.items||d.records||d.audit||[];$("#content").innerHTML=head("审计记录","查看后台配置、服务和任务操作")+`<div class="panel table-wrap"><table><thead><tr><th>时间</th><th>接口</th><th>结果</th><th>摘要</th></tr></thead><tbody>${items.map(x=>`<tr><td>${esc(x.time||x.created_at||"")}</td><td>${esc(x.path||x.action||"")}</td><td>${pill(x.result||x.status||"-",statusTone(x.result||x.status))}</td><td class="wrap">${esc(x.summary||x.error_summary||x.message||"")}</td></tr>`).join("")}</tbody></table>${items.length?"":`<div class="empty">暂无审计记录</div>`}</div>`}
    async function alerts(){const d=await api("/api/price-alerts");$("#content").innerHTML=head("价格提醒","管理 AI 助手创建的价格提醒")+`<div class="panel"><pre>${esc(JSON.stringify(d,null,2))}</pre></div>`}
    async function prompts(){const d=await api("/api/ai-prompts");$("#content").innerHTML=head("AI 提示词","维护助手与分析师系统提示词",`<button class="btn primary" onclick="savePrompts()">保存</button><button class="btn" onclick="resetPrompts()">恢复默认</button>`)+`<div class="grid"><label class="panel span-6 field"><b>助手提示词</b><textarea id="assistantPrompt" class="input">${esc(d.assistant_prompt||d.data?.assistant_prompt||"")}</textarea></label><label class="panel span-6 field"><b>分析师提示词</b><textarea id="analystPrompt" class="input">${esc(d.analyst_prompt||d.data?.analyst_prompt||"")}</textarea></label></div>`}
    async function savePrompts(){const r=await api("/api/ai-prompts",{method:"POST",body:JSON.stringify({action:"save",assistant_prompt:$("#assistantPrompt").value,analyst_prompt:$("#analystPrompt").value})});toast(r.message||"已保存")} async function resetPrompts(){if(!confirm("确认恢复默认提示词？"))return;await api("/api/ai-prompts",{method:"POST",body:JSON.stringify({action:"reset"})});toast("已恢复默认");loadPage("prompts")}
    const pages={overview,signals,services,jobs,logs,config,audit,alerts,prompts};async function loadPage(name){currentPage=name;document.querySelectorAll("#nav button").forEach(x=>x.classList.toggle("active",x.dataset.page===name));$("#content").innerHTML=`<div class="panel">正在加载...</div>`;try{await pages[name]()}catch(e){$("#content").innerHTML=head("加载失败",e.message)+`<div class="error">${esc(e.message)}</div>`}}
    $("#nav").addEventListener("click",e=>{const b=e.target.closest("button[data-page]");if(b)loadPage(b.dataset.page)});$("#loginForm").addEventListener("submit",async e=>{e.preventDefault();try{const d=await api("/api/auth/login",{method:"POST",body:JSON.stringify({username:$("#username").value,password:$("#password").value})});csrf=d.csrf_token||"";showApp();loadPage("overview")}catch(err){$("#loginError").textContent=err.message;$("#loginError").classList.remove("hidden")}});$("#logout").onclick=async()=>{try{await api("/api/auth/logout",{method:"POST",body:"{}"})}finally{csrf="";showLogin()}};
    (async()=>{try{const d=await api("/api/auth/status");if(d.logged_in||d.authenticated){csrf=d.csrf_token||"";showApp();loadPage("overview")}else showLogin()}catch{showLogin()}})();
  </script>
</body>
</html>
